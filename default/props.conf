# Classify VyOS logs arriving through a syslog sourcetype. This is intended for
# network inputs or SC4S/syslog-ng pipelines where the original source is syslog.
[source::udp:1514]
TRANSFORMS-vyos_sourcetype = vyos_set_netfilter_sourcetype, vyos_set_syslog_sourcetype, vyos_set_kea_dhcp_sourcetype

[source::tcp:1514]
TRANSFORMS-vyos_sourcetype = vyos_set_netfilter_sourcetype, vyos_set_syslog_sourcetype, vyos_set_kea_dhcp_sourcetype

[vyos:netfilter]
SHOULD_LINEMERGE = false
KV_MODE = none
REPORT-vyos_syslog_header = vyos_syslog_header
REPORT-vyos_netfilter_rule = vyos_netfilter_rule
REPORT-vyos_netfilter_rule_parts = vyos_netfilter_rule_parts
REPORT-vyos_netfilter_kv = vyos_netfilter_kv
REPORT-vyos_netfilter_flags = vyos_netfilter_flags
REPORT-vyos_netfilter_ip_flags = vyos_netfilter_ip_flags
FIELDALIAS-vyos_src = SRC AS src
FIELDALIAS-vyos_dest = DST AS dest
FIELDALIAS-vyos_inbound_interface = IN AS inbound_interface
FIELDALIAS-vyos_outbound_interface = OUT AS outbound_interface
EVAL-src_port = tonumber(mvindex(SPT, 0))
EVAL-dest_port = tonumber(mvindex(DPT, 0))
EVAL-transport = lower(mvindex(PROTO, 0))
EVAL-packet_len = tonumber(mvindex(LEN, 0))
EVAL-ttl = tonumber(mvindex(TTL, 0))
EVAL-action = case(action_code=="A","allowed", action_code=="D","blocked", action_code=="R","rejected", true(),"unknown")
EVAL-vendor_product = "VyOS"
LOOKUP-vyos_netfilter_service = network_services DPT, PROTO OUTPUTNEW service AS dest_service

[vyos:kea:dhcp]
SHOULD_LINEMERGE = false
KV_MODE = none
REPORT-vyos_syslog_header = vyos_syslog_header
REPORT-vyos_program = vyos_program
REPORT-kea_header = kea_header
REPORT-kea_packet = kea_packet
REPORT-kea_lease = kea_lease
REPORT-kea_ddns_request = kea_ddns_request
REPORT-kea_ddns_detail_bracket = kea_ddns_detail_bracket
REPORT-kea_ddns_detail_plain = kea_ddns_detail_plain
EVAL-vendor_product = "VyOS"
EVAL-dhcp_version = case(process=="kea-dhcp4","dhcp4", process=="kea-dhcp6","dhcp6", process=="kea-dhcp-ddns","ddns", true(), null())
EVAL-action = case(match(kea_message_id,"LEASE_ALLOC|LEASE_ADVERT"),"lease_allocated", match(kea_message_id,"LEASE_RENEW"),"lease_renewed", match(kea_message_id,"LEASE_RELEASE"),"lease_released", match(kea_message_id,"PACKET_RECEIVED"),"packet_received", match(kea_message_id,"PACKET_SEND"),"packet_sent", match(kea_message_id,"COMMAND_RECEIVED"),"command_received", match(kea_message_id,"NO_MATCH|ERROR"),"error", true(), null())

[vyos:syslog]
SHOULD_LINEMERGE = false
KV_MODE = auto
REPORT-vyos_syslog_header = vyos_syslog_header
REPORT-vyos_program = vyos_program
REPORT-vyos_daemon_severity = vyos_daemon_severity
REPORT-vyos_frr_error = vyos_frr_error
REPORT-vyos_quoted_kv = vyos_quoted_kv
EVAL-vendor_product = "VyOS"
