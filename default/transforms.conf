[vyos_set_netfilter_sourcetype]
REGEX = \s(?:vyos-[A-Za-z0-9_.-]+|\d{1,3}(?:\.\d{1,3}){3})\s+(?:\w{3}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2}\s+)?vyos-[A-Za-z0-9_.-]+\s+kernel:\s+\[ipv[46]-
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::vyos:netfilter

[vyos_set_syslog_sourcetype]
REGEX = \s(?:vyos-[A-Za-z0-9_.-]+|\d{1,3}(?:\.\d{1,3}){3})\s+(?:\w{3}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2}\s+)?vyos-[A-Za-z0-9_.-]+\s+(?!kernel:\s+\[ipv[46]-)[A-Za-z0-9_./-]+(?:\[\d+\])?:
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::vyos:syslog

[vyos_syslog_header]
REGEX = ^(?:<\d+>)?(?<syslog_time>\w{3}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2})\s+(?<syslog_relay_host>\S+)\s+(?:(?<vyos_time>\w{3}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2})\s+)?(?<vyos_host>\S+)\s+

[vyos_program]
REGEX = ^(?:<\d+>)?\w{3}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2}\s+\S+\s+(?:\w{3}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2}\s+)?\S+\s+(?<process>[A-Za-z0-9_./-]+)(?:\[(?<pid>\d+)\])?:

[vyos_netfilter_rule]
REGEX = kernel:\s+\[(?<vyos_rule>.+?)\](?<vyos_netfilter_payload>.*)$

[vyos_netfilter_rule_parts]
REGEX = kernel:\s+\[(?<ip_version>ipv[46])-(?<vyos_ruleset>.+)-(?<vyos_rule_num>\d+)-(?<action_code>[A-Z])\]

[vyos_netfilter_kv]
REGEX = (?<_KEY_1>[A-Z_]+)=(?<_VAL_1>"[^"]*"|[^ ]+)
MV_ADD = true
CLEAN_KEYS = false
