[vyos_set_netfilter_sourcetype]
REGEX = \s(?:vyos-[A-Za-z0-9_.-]+|\d{1,3}(?:\.\d{1,3}){3})\s+(?:\w{3}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2}\s+)?vyos-[A-Za-z0-9_.-]+\s+kernel:\s+\[ipv[46]-
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::vyos:netfilter

[vyos_set_syslog_sourcetype]
REGEX = \s(?:vyos-[A-Za-z0-9_.-]+|\d{1,3}(?:\.\d{1,3}){3})\s+(?:\w{3}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2}\s+)?vyos-[A-Za-z0-9_.-]+\s+(?!kernel:\s+\[ipv[46]-)[A-Za-z0-9_./-]+(?:\[\d+\])?:
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::vyos:syslog

[vyos_set_kea_dhcp_sourcetype]
REGEX = \s(?:vyos-[A-Za-z0-9_.-]+|\d{1,3}(?:\.\d{1,3}){3})\s+(?:\w{3}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2}\s+)?vyos-[A-Za-z0-9_.-]+\s+kea-dhcp(?:4|6|-ddns)\[\d+\]:
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::vyos:kea:dhcp

[vyos_syslog_header]
REGEX = ^(?:<\d+>)?(?<syslog_time>\w{3}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2})\s+(?<syslog_relay_host>\S+)\s+(?:(?<vyos_time>\w{3}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2})\s+)?(?<vyos_host>\S+)\s+

[vyos_program]
REGEX = ^(?:<\d+>)?\w{3}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2}\s+\S+\s+(?:\w{3}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2}\s+)?\S+\s+(?<process>[A-Za-z0-9_./-]+)(?:\[(?<pid>\d+)\])?:

[vyos_netfilter_rule]
REGEX = kernel:\s+\[(?<vyos_rule>.+?)\](?<vyos_netfilter_payload>.*)$

[vyos_netfilter_rule_parts]
REGEX = kernel:\s+\[(?<ip_version>ipv[46])-(?<vyos_ruleset>.+)-(?<vyos_rule_num>\d+)-(?<action_code>[A-Z])\]

[vyos_netfilter_kv]
REGEX = (?<_KEY_1>[A-Z_]+)=(?<_VAL_1>"[^"]*"|[^ ]+)
MV_ADD = true
CLEAN_KEYS = false

[vyos_netfilter_flags]
REGEX = \s(?<tcp_flag>SYN|ACK|PSH|FIN|RST|URG|ECE|CWR)\b
MV_ADD = true

[vyos_netfilter_ip_flags]
REGEX = \s(?<ip_flag>DF|MF)\s
MV_ADD = true

[kea_header]
REGEX = (?<kea_time>\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2}\.\d+)\s+(?<log_level>[A-Z]+)\s+\[(?<kea_logger>[^/\]]+)/(?<kea_pid>\d+)\.(?<kea_thread>\d+)\]\s+(?<kea_message_id>[A-Z0-9_]+)\s+(?<kea_message>.*)$

[kea_packet]
REGEX = \[hwtype=(?<hwtype>\d+)\s+(?<mac>[0-9a-f:]+)\],\s+cid=\[(?<client_id>[0-9a-f:]+)\],\s+tid=(?<transaction_id>0x[0-9a-f]+):\s+(?:(?:trying to send packet\s+)?(?<dhcp_message>[A-Z0-9_-]+)\s+\(type\s+(?<dhcp_message_type>\d+)\)\s+(?<packet_direction>received|from|to|trying).*?(?:from\s+(?<src>\d{1,3}(?:\.\d{1,3}){3})(?::(?<src_port>\d+))?)?(?:\s+to\s+(?<dest>\d{1,3}(?:\.\d{1,3}){3})(?::(?<dest_port>\d+))?)?(?:\s+on interface\s+(?<interface>\S+))?|received query:)

[kea_lease]
REGEX = lease\s+(?<lease_ip>\d{1,3}(?:\.\d{1,3}){3})\s+has been (?<lease_action>allocated|renewed|released)(?:\s+for\s+(?<lease_duration>\d+)\s+seconds)?

[kea_ddns_request]
REGEX = (?<log_level>ERROR|WARN)\s+(?<kea_message_id>DHCP_DDNS_[A-Z0-9_]+)(?:\s+Request ID\s+(?<request_id>[0-9A-F]+):)?\s+(?<kea_message>.*?)(?:Type:\s+(?<ddns_change_type_num>\d+)\s+\((?<ddns_change_type>CHG_[A-Z]+)\))?$

[kea_ddns_detail_bracket]
REGEX = (?<ddns_detail_key>FQDN|IP Address|DHCID):\s+\[(?<ddns_detail_value>[^\]]*)\]
MV_ADD = true

[kea_ddns_detail_plain]
REGEX = (?<ddns_detail_key>Forward Change|Reverse Change|Lease Length|Lease Expires On|Conflict Resolution Mode):\s+(?<ddns_detail_value>.+)$
MV_ADD = true

[vyos_daemon_severity]
REGEX = :\s+(?<log_level>ERROR|WARN|INFO|NOTICE|DEBUG|CRITICAL|ALERT|EMERGENCY)\s+(?<daemon_message_id>[A-Z0-9_]+)?\s*(?<daemon_message>.*)$

[vyos_frr_error]
REGEX = (?<daemon_message_id>\[EC\s+\d+\])\s+(?<daemon_message>.*)$

[vyos_quoted_kv]
REGEX = (?<_KEY_1>[A-Za-z][A-Za-z0-9_-]+)="(?<_VAL_1>[^"]*)"
MV_ADD = true
CLEAN_KEYS = true
